    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="theme-toggle__icon" id="iconSun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>

        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>

  </header>

  <main class="about-page">
    <div class="about__container" id="aboutContent">
      <p style="color:var(--text-muted);text-align:center;">Loading...</p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Luis Matias</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/data-loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const data = await fetchSheetCached(1472778998);
        const el = document.getElementById('aboutContent');
        if (el && data.length) {
          const paragraphs = data.map(row => row.text).filter(Boolean);
          el.innerHTML = `
            <h1 class="about__title">About Me</h1>
            <div class="about__text">
              ${paragraphs.map(p => `<p>${p}</p>`).join('')}
            </div>
          `;
        }
      } catch(e) { console.error('About load error:', e); }
    });
  </script>
</body>
