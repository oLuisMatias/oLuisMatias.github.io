  <!-- YouTube modal -->
  <div class="yt-modal" id="ytModal" hidden>
    <div class="yt-modal__backdrop" onclick="closeYoutubeModal()"></div>
    <div class="yt-modal__box">
      <button class="yt-modal__close" onclick="closeYoutubeModal()">✕</button>
      <iframe id="ytFrame" src="" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>
  </div>

  <script>
    function openYoutubeModal(url) {
      const modal = document.getElementById('ytModal');
      const frame = document.getElementById('ytFrame');
      // Convert youtube URL to embed URL
      let embedUrl = url;
      if (url.includes('youtube.com/watch')) {
        const videoId = new URL(url).searchParams.get('v');
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      } else if (url.includes('youtu.be/')) {
        const videoId = url.split('youtu.be/')[1].split('?')[0];
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      }
      frame.src = embedUrl;
      modal.removeAttribute('hidden');
    }
    function closeYoutubeModal() {
      const modal = document.getElementById('ytModal');
      const frame = document.getElementById('ytFrame');
      frame.src = '';
      modal.setAttribute('hidden', '');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeYoutubeModal(); });
  </script>

  <!-- 3D viewer modal -->

            <button id="ctxShowAll">Show All</button>

        </div>
