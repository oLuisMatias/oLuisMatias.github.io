<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects – Luis Matias</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="projects-page">

  <header class="navbar">
    <div class="navbar__logo">
      <a href="index.html">MySite</a>
    </div>
    <nav class="navbar__links">
      <a href="cv.html">Curriculum</a>
      <a href="projects.html">Projects</a>
      <a href="#">Contact</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="theme-toggle__icon" id="iconSun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="theme-toggle__icon" id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <div class="projects-layout">

    <!-- Left: project list -->
    <aside class="projects-sidebar" id="projectsSidebar">
      <div class="projects-sidebar__item">
        <img src="images/projects/placeholder.jpg" alt="Project">
        <span>Project Name</span>
      </div>
    </aside>

    <!-- Right: project detail -->
    <main class="projects-detail" id="projectsDetail">
      <div class="projects-detail__empty">
        <p>Select a project to view details</p>
      </div>
    </main>

  </div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="js/main.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/projects-loader.js"></script>
  <script type="module" src="js/viewer3d.js"></script>

  <!-- 3D viewer modal -->
  <div class="model-modal" id="modelModal" hidden>
    <div class="model-modal__backdrop" id="modelBackdrop"></div>
    <div class="model-modal__box">
      <button class="model-modal__close" id="modelClose">✕</button>
      <div class="model-modal__layout">
        <div class="model-modal__tree-panel">
          <div class="model-modal__tree-header">Parts</div>
          <div class="model-modal__tree" id="modelTree"></div>
        </div>
        <div class="model-modal__viewport">
          <div class="model-modal__controls">
            <div class="model-modal__controls-row">
              Left – Rotate &nbsp;|&nbsp; Mid – Zoom &nbsp;|&nbsp; Right – Pan
            </div>
            <div class="model-modal__controls-row">
              <span class="model-modal__label">Background</span>
              <span class="model-modal__bg-swatch active" id="bgSwatch0" data-bg="0" style="background:#1a1a1a;"></span>
              <span class="model-modal__bg-swatch" id="bgSwatch1" data-bg="1" style="background:#ffffff;"></span>
              <span class="model-modal__sep">|</span>
              <button id="modelCamToggle" class="model-modal__bg-btn">Perspective</button>
              <span class="model-modal__sep">|</span>
              <button id="modelIso" class="model-modal__bg-btn">ISO View</button>
            </div>
          </div>
          <canvas id="modelCanvas"></canvas>
          <div class="model-modal__context-menu" id="modelContextMenu" hidden>
            <button id="ctxHidePart">Hide Part</button>
            <button id="ctxShowOnly">Show Only This</button>
            <button id="ctxShowAll">Show All</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
