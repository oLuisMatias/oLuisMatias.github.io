<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV – Luis Matias</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="cv-page">

  <header class="navbar">
    <div class="navbar__logo">
      <a href="index.html">Luis Matias</a>
    </div>
    <nav class="navbar__links">
      <a href="cv.html">Curriculum</a>
      <a href="projects.html">Projects</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="theme-toggle__icon" id="iconSun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="theme-toggle__icon" id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <div class="cv-layout">

    <!-- Left: section nav -->
    <aside class="cv-sidebar">
      <div class="cv-sidebar__header">
        <h1>Curriculum Vitae</h1>
      </div>
      <nav class="cv-sidebar__nav">
        <button class="cv-sidebar__item active" data-section="work">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          Work
        </button>
        <button class="cv-sidebar__item" data-section="certifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M9 21l3-3 3 3"/><path d="M9 12l-2 9"/><path d="M15 12l2 9"/></svg>
          Certifications
        </button>
        <button class="cv-sidebar__item" data-section="studies">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.657 2.686 3 6 3s6-1.343 6-3v-5"/></svg>
          Education
        </button>
        <button class="cv-sidebar__item" data-section="projects">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          Key Projects
        </button>
        <button class="cv-sidebar__item" data-section="experiences">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/></svg>
          Experiences
        </button>
      </nav>
      <div class="cv-sidebar__footer">
        <a href="data/documents/CV_Luis_Matias.pdf" download class="btn btn--outline">Download PDF</a>
      </div>
    </aside>

    <!-- Right: section content -->
    <main class="cv-detail" id="cvDetail">
      <div class="cv-detail__loading">Loading...</div>
    </main>

  </div>

  <!-- Hidden section containers populated by data-loader.js -->
  <div hidden>
    <div id="section-work"></div>
    <div id="section-studies"></div>
    <div id="section-projects"></div>
    <div id="section-experiences"></div>
    <div id="section-certifications"></div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/data-loader.js"></script>

  <!-- PDF viewer modal -->
  <div class="pdf-modal" id="pdfModal" hidden>
    <div class="pdf-modal__backdrop" id="pdfBackdrop"></div>
    <div class="pdf-modal__box">
      <button class="pdf-modal__close" id="pdfClose">✕</button>
      <iframe id="pdfFrame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script>
    function openPdfModal(src) {
      const modal = document.getElementById('pdfModal');
      const frame = document.getElementById('pdfFrame');
      frame.src = src;
      modal.removeAttribute('hidden');
    }
    function closePdfModal() {
      const modal = document.getElementById('pdfModal');
      const frame = document.getElementById('pdfFrame');
      frame.src = '';
      modal.setAttribute('hidden', '');
    }
    document.getElementById('pdfClose').addEventListener('click', closePdfModal);
    document.getElementById('pdfBackdrop').addEventListener('click', closePdfModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePdfModal(); });
  </script>
</body>
</html>
